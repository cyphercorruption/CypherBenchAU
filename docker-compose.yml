services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      # Allow multiple databases (required for Enterprise, free in 5.x Community with single DB)
      # For Community edition, use NEO4J_DATABASE_MAP to route all graphs to "neo4j"
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_dbms_memory_transaction_total_max: 4G
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
